<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Portfolio</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <div class="container">

    <button onclick="toggleLanguage()" class="lang-btn">
      🌐 Change Language
    </button>

    <h1 id="title">👋 Hi, I’m Yamamah</h1>

    <p id="desc">
      I’m a Front-End Developer in progress. I love building clean and simple websites.
    </p>

    <a href="portfolio.html" class="btn" id="btn">View My Portfolio</a>

  </div>

  <script>
    let isArabic = false;

    function toggleLanguage() {
      isArabic = !isArabic;

      if (isArabic) {
        document.getElementById("title").innerText = "👋 أهلاً، أنا يمامة";
        document.getElementById("desc").innerText = "أنا متعلمة تطوير واجهات أمامية وأحب تصميم مواقع بسيطة وجميلة";
        document.getElementById("btn").innerText = "عرض المشاريع";
      } else {
        document.getElementById("title").innerText = "👋 Hi, I’m Yamamah";
        document.getElementById("desc").innerText = "I’m a Front-End Developer in progress. I love building clean and simple websites.";
        document.getElementById("btn").innerText = "View My Portfolio";
      }
    }
  </script>

</body>
</html>
